<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TanGuyen02</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.97/build/spline-viewer.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050505;--s1:#0D1225;--s2:#111830;
  --p:#8B5CF6;--pl:#A78BFA;--pd:rgba(139,92,246,.15);--pb:rgba(139,92,246,.25);
  --amber:#F59E0B;--al:#FCD34D;--ad:rgba(245,158,11,.15);
  --rose:#EC4899;--rd:rgba(236,72,153,.15);
  --em:#10B981;--ed:rgba(16,185,129,.15);
  --txt:#E2E8F0;--tm:#8B96A8;--td:#475569;
  --bdr:rgba(139,92,246,.2);--bdrh:rgba(139,92,246,.5);
  --r:16px;--rl:24px;
  --sh:0 16px 60px rgba(0,0,0,.8);
  --gp:0 0 32px rgba(139,92,246,.3);
  --tr:all .3s cubic-bezier(.34,1.56,.64,1);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Outfit',system-ui,sans-serif;color:var(--txt);-webkit-font-smoothing:antialiased}
spline-viewer{position:fixed;inset:0;z-index:0;width:100%;height:100%}
header{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:20px 44px;background:linear-gradient(to bottom,rgba(5,5,5,.9) 0%,transparent 100%);pointer-events:auto}
.logo{display:flex;align-items:center;gap:12px}
.logo-gem{width:34px;height:34px;background:linear-gradient(135deg,var(--p),var(--rose));border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(236,72,153,.4)}
.logo-gem svg{width:18px;height:18px;color:#fff}
#auth-area{pointer-events:auto}
.btn-si{display:flex;align-items:center;gap:8px;padding:10px 24px;background:var(--pd);border:1px solid var(--bdrh);border-radius:40px;color:var(--pl);font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:var(--tr);backdrop-filter:blur(16px)}
.btn-si:hover{background:var(--pb);box-shadow:var(--gp);transform:translateY(-2px)}
.user-pill{display:flex;align-items:center;gap:12px;padding:6px 16px 6px 6px;background:var(--pd);border:1px solid var(--bdr);border-radius:40px;cursor:default;backdrop-filter:blur(16px)}
.user-pill:hover{border-color:var(--bdrh)}
.avi{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--rose));display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#fff;flex-shrink:0}
.u-name{font-size:.85rem;font-weight:500;color:var(--txt)}
.btn-so{padding:5px 14px;background:transparent;border:1px solid var(--bdr);border-radius:20px;color:var(--tm);font-size:.75rem;font-family:'Outfit',sans-serif;cursor:pointer;transition:var(--tr)}
.btn-so:hover{border-color:var(--rose);color:var(--rose)}

/* === ORBIT CARDS === */
#orbit-container{position:fixed;inset:0;z-index:20;pointer-events:none;display:grid;grid-template-columns:minmax(200px,1fr) minmax(300px,600px) minmax(200px,1fr);grid-template-rows:1fr;padding:100px 40px 60px}
.sidebar{display:flex;flex-direction:column;justify-content:space-around;gap:20px;pointer-events:none}
.left-sidebar{grid-column:1;align-items:start}
.right-sidebar{grid-column:3;align-items:end}
.cw{pointer-events:auto;width:100%;max-width:240px}
.orbit-card{width:100%;padding:16px 20px;background:rgba(15,20,35,.5);border:1px solid rgba(255,255,255,.1);border-radius:var(--rl);backdrop-filter:blur(16px);cursor:pointer;display:flex;align-items:center;gap:16px;transition:var(--tr);user-select:none;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.orbit-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.05) 0%,transparent 100%);pointer-events:none}
.orbit-card:hover{border-color:var(--pl);box-shadow:var(--gp),var(--sh);transform:translateY(-4px);background:rgba(139,92,246,.15)}
.orbit-card:active{transform:scale(.96)}
.ci-wrap{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ci-polls{background:var(--rd);color:var(--rose)}
.ci-tales{background:var(--pd);color:var(--pl)}
.ci-cal{background:var(--ed);color:var(--em)}
.ci-gallery{background:var(--rd);color:var(--rose)}
.ci-vis{background:var(--ad);color:var(--amber)}
.ci-profile{background:rgba(255,255,255,.06);color:var(--tm)}
.ci-wrap svg{width:22px;height:22px}
.card-text{display:flex;flex-direction:column;text-align:left}
.c-title{font-size:.95rem;font-weight:600;color:var(--txt);margin-bottom:2px}
.c-desc{font-size:.7rem;color:var(--tm);font-weight:400}

/* === OVERLAY & MODALS === */
#ov{position:fixed;inset:0;z-index:200;background:rgba(5,5,5,.87);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;pointer-events:auto}
#ov.on{display:flex;animation:fi .2s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{display:none;flex-direction:column;background:linear-gradient(155deg,#0f111a,#130c1f);border:1px solid var(--bdr);border-radius:26px;width:min(660px,92vw);max-height:88vh;overflow:hidden;box-shadow:0 24px 90px rgba(0,0,0,.9),var(--gp);position:relative}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--pl),transparent);z-index:1}
.modal.on{display:flex;animation:su .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes su{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.mh{padding:26px 30px 22px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.mt{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--txt)}
.mha{display:flex;align-items:center;gap:10px}
.mbtn-x{width:34px;height:34px;border:1px solid rgba(255,255,255,.1);border-radius:50%;background:rgba(255,255,255,.03);color:var(--tm);font-size:.92rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr);flex-shrink:0}
.mbtn-x:hover{border-color:var(--rose);color:var(--rose);transform:rotate(90deg);background:var(--rd)}
.mb{flex:1;overflow-y:auto;padding:26px 30px}
.mb::-webkit-scrollbar{width:5px}
.mb::-webkit-scrollbar-track{background:transparent}
.mb::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}

/* === FORMS === */
.fg{margin-bottom:16px}
.fl{display:block;font-size:.72rem;font-weight:600;color:var(--tm);margin-bottom:7px;letter-spacing:.08em;text-transform:uppercase}
.fi,.fta{width:100%;padding:11px 15px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:var(--txt);font-family:'Outfit',sans-serif;font-size:.9rem;transition:var(--tr);outline:none;resize:none}
.fi:focus,.fta:focus{border-color:var(--pl);background:rgba(139,92,246,.05);box-shadow:0 0 0 3px rgba(139,92,246,.15)}
.fta{min-height:90px}
.btn-p{width:100%;padding:13px;background:linear-gradient(135deg,var(--p),#6d28d9);border:none;border-radius:13px;color:#fff;font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:var(--tr);margin-top:4px}
.btn-p:hover{box-shadow:0 6px 24px rgba(139,92,246,.4);transform:translateY(-2px);filter:brightness(1.1)}
.btn-s{padding:9px 20px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.12);border-radius:11px;color:var(--pl);font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:var(--tr)}
.btn-s:hover{background:var(--pd);border-color:var(--pl);transform:translateY(-1px)}
.atabs{display:flex;gap:4px;background:rgba(0,0,0,.3);border-radius:12px;padding:4px;margin-bottom:24px}
.atab{flex:1;padding:10px;border:none;background:transparent;border-radius:10px;color:var(--tm);font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;transition:var(--tr)}
.atab.on{background:var(--pd);color:var(--pl);border:1px solid rgba(139,92,246,.3)}
.gbtn{width:100%;display:flex;align-items:center;justify-content:center;gap:12px;padding:13px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:13px;color:var(--txt);font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;transition:var(--tr);margin-bottom:22px}
.gbtn:hover{background:rgba(255,255,255,.1);transform:translateY(-2px)}
.gdiv{display:flex;align-items:center;gap:14px;margin-bottom:22px;color:var(--td);font-size:.75rem;text-transform:uppercase;letter-spacing:.1em}
.gdiv::before,.gdiv::after{flex:1;content:'';height:1px;background:rgba(255,255,255,.1)}
.err{padding:10px 14px;border-radius:10px;font-size:.81rem;margin-bottom:14px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#FCA5A5;display:none}
.err.on{display:block}
.hint{font-size:.8rem;color:var(--tm);text-align:center;margin-top:16px}
.hint a{color:var(--pl);cursor:pointer;text-decoration:none}
.hint a:hover{text-decoration:underline}
.tag{padding:4px 12px;background:var(--pd);border:1px solid rgba(139,92,246,.2);border-radius:20px;font-size:.7rem;color:var(--pl);font-weight:500}
.info-banner{background:var(--pd);border:1px solid var(--bdr);border-radius:12px;padding:14px 18px;font-size:.85rem;color:var(--pl);margin-bottom:20px;text-align:center}
.info-banner a{color:#fff;cursor:pointer;font-weight:600}
.post-box{background:rgba(0,0,0,.2);border:1px dashed rgba(255,255,255,.15);border-radius:14px;padding:20px;margin-bottom:24px}
.post-box-title{font-size:.9rem;font-weight:600;color:var(--txt);margin-bottom:16px;display:flex;align-items:center;gap:8px}
/* Stories */
.story-card{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.05);border-radius:16px;padding:22px;margin-bottom:14px;transition:var(--tr);cursor:pointer}
.story-card:hover{border-color:var(--bdr);background:rgba(139,92,246,.05);transform:translateX(4px)}
.sc-title{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--txt);margin-bottom:10px}
.sc-excerpt{font-size:.85rem;color:var(--tm);line-height:1.6;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.sc-meta{display:flex;align-items:center;justify-content:space-between;font-size:.78rem;color:var(--tm)}
.sc-author{display:flex;align-items:center;gap:8px}
.sc-avi{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--rose));display:flex;align-items:center;justify-content:center;font-size:.6rem;color:#fff;font-weight:700}
.lbtn{display:flex;align-items:center;gap:5px;padding:6px 12px;border:1px solid rgba(255,255,255,.1);border-radius:20px;background:rgba(255,255,255,.02);color:var(--tm);font-size:.75rem;cursor:pointer;transition:var(--tr);font-family:'Outfit',sans-serif}
.lbtn:hover,.lbtn.liked{border-color:var(--rose);color:var(--rose);background:var(--rd)}
.sfull{font-family:'DM Serif Display',serif;font-size:1.05rem;line-height:1.9;white-space:pre-wrap;font-style:italic;color:var(--txt)}
.sfull-meta{margin-top:26px;padding-top:20px;border-top:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between;font-size:.8rem;color:var(--tm)}
.tags-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
/* Gallery */
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.pc{position:relative;aspect-ratio:1;border-radius:14px;overflow:hidden;cursor:pointer;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.05)}
.pc img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.pc:hover img{transform:scale(1.08)}
.pc-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,5,5,.9) 0%,transparent 60%);opacity:0;transition:opacity .3s;display:flex;align-items:flex-end;padding:12px}
.pc:hover .pc-ov{opacity:1}
.pc-cap{font-size:.75rem;color:var(--txt);line-height:1.4}
/* Visions timeline */
.ptl{position:relative;padding-left:44px}
.ptl::before{content:'';position:absolute;left:14px;top:6px;bottom:0;width:2px;background:rgba(255,255,255,.05)}
.pi{position:relative;margin-bottom:24px}
.pdot{position:absolute;left:-30px;top:10px;width:14px;height:14px;border-radius:50%;background:var(--amber);border:3px solid #0f111a;box-shadow:0 0 12px rgba(245,158,11,.6)}
.pc2{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:20px;transition:var(--tr)}
.pc2:hover{border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.05);transform:translateX(4px)}
.p-date{font-size:.75rem;color:var(--amber);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;font-weight:600}
.p-title{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--txt);margin-bottom:8px}
.p-desc{font-size:.85rem;color:var(--tm);line-height:1.6}
.p-by{margin-top:12px;font-size:.75rem;color:var(--td);text-align:right}
.p-parti{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.p-chip{padding:3px 10px;background:var(--pd);border:1px solid var(--bdr);border-radius:20px;font-size:.7rem;color:var(--pl);font-weight:500}
/* Calendar */
.cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.cal-nav{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--txt);padding:8px 16px;cursor:pointer;font-size:1rem;transition:var(--tr);font-family:'Outfit',sans-serif}
.cal-nav:hover{border-color:var(--pl);color:var(--pl);background:var(--pd)}
.cal-month{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--txt)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:16px}
.cdh{text-align:center;font-size:.65rem;color:var(--td);text-transform:uppercase;letter-spacing:.08em;padding:6px 0;font-weight:700}
.cd{aspect-ratio:1;border-radius:10px;border:1px solid rgba(255,255,255,.03);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:.8rem;font-weight:500;color:var(--tm);transition:all .2s ease;position:relative;background:rgba(0,0,0,.2)}
.cd:hover:not(.empty){border-color:var(--pl);color:var(--txt);background:var(--pd)}
.cd.empty{cursor:default;background:transparent;border-color:transparent}
.cd.today{border-color:var(--p);color:var(--pl);background:rgba(139,92,246,.1)}
.cd.my-av{background:rgba(245,158,11,.15);border-color:var(--amber);color:var(--amber)}
.cd.selected{border-color:var(--pl)!important;background:var(--pd)!important;color:var(--pl)!important}
.cd.past{opacity:.4}
.cd-dots{display:flex;gap:3px;margin-top:4px;justify-content:center;flex-wrap:wrap;max-width:36px}
.cdd{width:5px;height:5px;border-radius:50%}
.cal-legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px}
.cl-item{display:flex;align-items:center;gap:7px;font-size:.74rem;color:var(--tm)}
.cl-dot{width:10px;height:10px;border-radius:4px}
.cal-info{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;font-size:.85rem;color:var(--tm);line-height:1.6;min-height:60px}
.cal-info-date{font-family:'DM Serif Display',serif;color:var(--txt);margin-bottom:10px;font-size:1.1rem}
/* Polls */
.poll-option{margin-bottom:8px;cursor:pointer;padding:11px 14px;border:1px solid rgba(255,255,255,.06);border-radius:12px;background:rgba(255,255,255,.02);position:relative;overflow:hidden;transition:all .2s ease;user-select:none}
.poll-option:hover{border-color:rgba(139,92,246,.3);background:rgba(139,92,246,.05)}
.poll-option.voted{border-color:rgba(139,92,246,.4);background:rgba(139,92,246,.1)}
.poll-bar{position:absolute;left:0;top:0;height:100%;background:rgba(139,92,246,.1);border-radius:inherit;transition:width .5s ease;pointer-events:none}
.poll-voted .poll-bar{background:rgba(139,92,246,.15)}
.poll-row{position:relative;display:flex;align-items:center;justify-content:space-between;z-index:1}
/* Toast */
#toast{position:fixed;bottom:30px;right:30px;z-index:9999;padding:14px 24px;background:var(--p);border-radius:14px;color:#fff;font-size:.9rem;font-weight:600;box-shadow:0 10px 30px rgba(139,92,246,.5);transform:translateY(80px);opacity:0;transition:all .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
#toast.on{transform:translateY(0);opacity:1}
.lbx{background:transparent!important;border:none!important;box-shadow:none!important}
.lbx-inner{position:relative;text-align:center}
.lbx-img{max-width:90vw;max-height:80vh;border-radius:20px;object-fit:contain;display:block;margin:0 auto;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.lbx-cap{margin-top:16px;color:var(--txt);font-family:'DM Serif Display',serif;font-size:1.1rem}
.lbx-x{position:absolute;top:-52px;right:0;width:40px;height:40px;border:1px solid rgba(255,255,255,.2);border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.lbx-x:hover{border-color:var(--rose);color:var(--rose)}
.lbx-del{position:absolute;top:-52px;left:0;width:40px;height:40px;border:1px solid rgba(239,68,68,.3);border-radius:50%;background:rgba(0,0,0,.6);color:#FCA5A5;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.lbx-del:hover{border-color:#EF4444;color:#EF4444;background:rgba(239,68,68,.2)}
.empty-st{text-align:center;padding:40px 20px;color:var(--tm)}
.empty-ic{width:60px;height:60px;border-radius:16px;background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--td);border:1px dashed rgba(255,255,255,.1)}
.empty-ic svg{width:28px;height:28px}
.empty-st p{font-size:.9rem;line-height:1.6}
@media(max-width:1024px){#orbit-container{grid-template-columns:1fr 1fr;grid-template-rows:auto auto;padding:100px 30px 40px;gap:20px;justify-items:center}.sidebar{flex-direction:row;justify-content:center;width:100%;gap:15px;flex-wrap:wrap}.left-sidebar{grid-column:1/3;grid-row:1;align-items:start}.right-sidebar{grid-column:1/3;grid-row:2;align-items:end}.cw{max-width:220px}}
@media(max-width:640px){#orbit-container{display:flex;flex-direction:column;overflow-y:auto;padding:80px 20px 30px;gap:15px}.sidebar{flex-direction:column;width:100%;padding:0;gap:12px}.cw{max-width:100%}.orbit-card{padding:14px 16px;gap:14px}.ci-wrap{width:42px;height:42px;border-radius:12px;margin:0}.ci-wrap svg{width:20px;height:20px}.c-title{font-size:.9rem}.c-desc{font-size:.7rem}header{padding:14px 20px}.pg{grid-template-columns:repeat(2,1fr)}.mh{padding:20px 24px 16px}.mb{padding:16px 24px}}
</style>
</head>
<body>
<spline-viewer url="https://prod.spline.design/PItA7a2aHv7RbhIc/scene.splinecode"></spline-viewer>
<header>
  <div class="logo">
    <div class="logo-gem"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/></svg></div>
  </div>
  <div id="auth-area"></div>
</header>
<div id="orbit-container">
  <div class="sidebar left-sidebar">
    <div class="cw"><div class="orbit-card" onclick="App.open('polls')">
      <div class="ci-wrap ci-polls"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
      <div class="card-text"><div class="c-title">Polls</div><div class="c-desc">Vote & decide together</div></div>
    </div></div>
    <div class="cw"><div class="orbit-card" onclick="App.open('stories')">

<script>
// =====================================================
// FIREBASE CẤU HÌNH ĐÃ ĐƯỢC CHUẨN HÓA
// =====================================================
const FIREBASE_ENABLED = true;
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAl6bD_3genvVbmCPimE9bZgHlEMDyZOJE",
  authDomain: "duachungminh.firebaseapp.com",
  databaseURL: "https://duachungminh-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "duachungminh"
};

let fbDB = null;
if (FIREBASE_ENABLED) {
  try { 
    firebase.initializeApp(FIREBASE_CONFIG); 
    fbDB = firebase.database(); 
  }
  catch(e) { console.warn('Firebase error:', e); }
}

// DB Abstraction — tự chọn Firebase hoặc localStorage
const DB = {
  save(key, val) {
    if (fbDB) fbDB.ref('data/'+key).set(val).catch(()=>{});
    try { localStorage.setItem('wx_'+key, JSON.stringify(val)); } catch(e) {}
  },
  load(key, fallback) {
    try { return JSON.parse(localStorage.getItem('wx_'+key)||'null') ?? fallback; }
    catch(e) { return fallback; }
  },
  subscribe(key, cb) {
    if (!fbDB) return;
    fbDB.ref('data/'+key).on('value', snap => {
      const v = snap.val();
      if (v === null) return;
      try { localStorage.setItem('wx_'+key, JSON.stringify(v)); } catch(e) {}
      cb(v);
    });
  }
};

// =====================================================
// DEFAULT DATA
// =====================================================
const DEF_STORIES = [];
const DEF_AV = {};
const MEMBER_COLORS = {};
const VIS_TYPES = [
  {key:'meetup',emoji:'👥',label:'Meetup',color:'rgba(139,92,246,.2)'},
  {key:'travel',emoji:'✈️',label:'Travel',color:'rgba(16,185,129,.2)'},
  {key:'event', emoji:'🎉',label:'Event', color:'rgba(245,158,11,.2)'},
  {key:'activity',emoji:'🎯',label:'Activity',color:'rgba(236,72,153,.2)'},
  {key:'other', emoji:'💡',label:'Other', color:'rgba(255,255,255,.08)'}
];
const BOOK_TYPES = [
  {key:'meetup',emoji:'👥',color:'rgba(139,92,246,.25)'},
  {key:'travel',emoji:'✈️',color:'rgba(16,185,129,.25)'},
  {key:'event', emoji:'🎉',color:'rgba(245,158,11,.25)'},
  {key:'activity',emoji:'🎯',color:'rgba(236,72,153,.25)'},
  {key:'other', emoji:'📌',color:'rgba(255,255,255,.1)'}
];

// =====================================================
// STATE
// =====================================================
const S = {
  user:null, stories:[], photos:[], plans:[], polls:[], bookings:[], avail:{},
  stack:[], calYear:2026, calMonth:0, selDay:null,
  postOpen:false, addPlanOpen:false, pollCreateOpen:false,
  authMode:'signin', bookType:'meetup', planType:'meetup',
  load() {
    try {
      this.user = JSON.parse(localStorage.getItem('wx_user')||'null');
      this.stories  = DB.load('stories',  [...DEF_STORIES]);
      this.photos   = DB.load('photos',   []);
      this.plans    = DB.load('plans',    []);
      this.polls    = DB.load('polls',    []);
      this.bookings = DB.load('bookings', []);
      this.avail    = DB.load('avail',    {});
    } catch(e) { this.stories=[...DEF_STORIES]; this.photos=[]; this.plans=[]; this.polls=[]; this.bookings=[]; this.avail={}; }
  },
  save(k,v) { this[k]=v; DB.save(k,v); },
  setUser(u) { this.user=u; u?localStorage.setItem('wx_user',JSON.stringify(u)):localStorage.removeItem('wx_user'); App.updateAuth(); }
};

// =====================================================
// APP CONTROL
// =====================================================
const App = {
  open(name,data) { this.closeAll(); S.stack=[name]; const el=document.getElementById('m-'+name); if(!el) return; document.getElementById('ov').classList.add('on'); el.classList.add('on'); this.render(name,data); },
  openOver(name,data) { const cur=document.querySelector('.modal.on'); if(cur) cur.classList.remove('on'); S.stack.push(name); const el=document.getElementById('m-'+name); document.getElementById('ov').classList.add('on'); el.classList.add('on'); this.render(name,data); },
  back() { S.stack.pop(); if(!S.stack.length){this.closeAll();return;} const prev=S.stack[S.stack.length-1]; document.querySelectorAll('.modal.on').forEach(m=>m.classList.remove('on')); const el=document.getElementById('m-'+prev); el.classList.add('on'); this.render(prev); },
  closeAll() { document.getElementById('ov').classList.remove('on'); document.querySelectorAll('.modal').forEach(m=>m.classList.remove('on')); S.stack=[]; S.postOpen=false; S.addPlanOpen=false; S.pollCreateOpen=false; },
  ovClick(e) { if(e.target===document.getElementById('ov')) this.closeAll(); },
  render(name,data) {
    if(name==='auth')     Auth.render();
    else if(name==='polls')    Polls.render();
    else if(name==='stories')  Stories.render();
    else if(name==='gallery')  Gallery.render();
    else if(name==='visions')  Visions.render();
    else if(name==='calendar') Cal.render();
    else if(name==='profile')  Profile.render();
    else if(name==='story')    Stories.renderDetail(data);
    else if(name==='lbx')      Gallery.renderLbx(data);
  },
  updateAuth() {
    const a=document.getElementById('auth-area');
    if(S.user) { const ini=S.user.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); a.innerHTML=`<div class="user-pill"><div class="avi">${ini}</div><span class="u-name">${S.user.name}</span><button class="btn-so" onclick="Auth.out()">Sign out</button></div>`; }
    else { a.innerHTML=`<button class="btn-si" onclick="App.open('auth')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Sign In</button>`; }
  }
};

// =====================================================
// AUTH
// =====================================================
const Auth = {
  render() {
    const el=document.getElementById('m-auth'),m=S.authMode;
    el.innerHTML=`<div class="mh"><div class="mt">${m==='signin'?'Sign In':'Create Account'}</div><button class="mbtn-x" onclick="App.closeAll()">✕</button></div>
    <div class="mb">
      <div class="atabs"><button class="atab ${m==='signin'?'on':''}" onclick="Auth.setMode('signin')">Sign In</button><button class="atab ${m==='register'?'on':''}" onclick="Auth.setMode('register')">Create Account</button></div>
      <div id="auth-err" class="err"></div>
      <button class="gbtn" onclick="Auth.google()"><svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.9 0 6.6 1.7 8.1 3.1l6-5.8C34.2 3.5 29.5 1.5 24 1.5 14.8 1.5 7 7.2 3.7 15.3l7 5.4C12.4 13.6 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.6H24v8.7h12.5c-.5 2.8-2.1 5.1-4.5 6.7l7 5.4c4.1-3.8 6.5-9.4 6.5-16.2z"/><path fill="#FBBC05" d="M10.8 28.3c-.5-1.5-.7-3-.7-4.6s.3-3.2.7-4.6l-7-5.4C2.3 16.6 1.5 20.2 1.5 24s.8 7.4 2.3 10.3l7-5.4v.4z"/><path fill="#34A853" d="M24 46.5c5.5 0 10.1-1.8 13.5-4.9l-7-5.4c-1.9 1.3-4.3 2-6.5 2-6.3 0-11.6-4.1-13.3-9.9l-7 5.4C7 40.8 14.8 46.5 24 46.5z"/></svg>Quick Demo Login</button>
      <div class="gdiv">or use email</div>
      ${m==='register'?`<div class="fg"><label class="fl">Display Name</label><input class="fi" id="a-name" placeholder="Your name"></div>`:''}
      <div class="fg"><label class="fl">Email</label><input class="fi" id="a-email" placeholder="you@email.com" type="email"></div>
      <div class="fg"><label class="fl">Password</label><input class="fi" id="a-pass" placeholder="Min 6 characters" type="password" onkeydown="if(event.key==='Enter')Auth.submit()"></div>
      ${m==='register'?`<div class="fg"><label class="fl">Confirm Password</label><input class="fi" id="a-pass2" placeholder="Repeat password" type="password" onkeydown="if(event.key==='Enter')Auth.submit()"></div>`:''}
      <button class="btn-p" onclick="Auth.submit()">${m==='signin'?'Sign In →':'Create Account →'}</button>
      <p class="hint">${m==='signin'?`No account? <a onclick="Auth.setMode('register')">Create one</a>`:`Have one? <a onclick="Auth.setMode('signin')">Sign in</a>`}</p>
    </div>`;
  },
  setMode(m){S.authMode=m;Auth.render()},
  google(){const n=prompt('Enter your display name:','');if(!n||!n.trim())return;S.setUser({name:n.trim(),email:n.trim().toLowerCase().replace(/\s/g,'_')+'@demo.com'});App.closeAll();toast(`Welcome, ${S.user.name}! 🚀`)},
  submit(){
    const err=s=>{const e=document.getElementById('auth-err');e.textContent=s;e.classList.add('on')};
    document.getElementById('auth-err').classList.remove('on');
    const email=(document.getElementById('a-email')||{}).value||'';
    const pass=(document.getElementById('a-pass')||{}).value||'';
    if(!email||!pass){err('Please fill in all fields.');return}
    if(pass.length<6){err('Password must be at least 6 characters.');return}
    const accs=JSON.parse(localStorage.getItem('wx_accounts')||'{}');
    if(S.authMode==='register'){
      const name=(document.getElementById('a-name')||{}).value||'';
      const pass2=(document.getElementById('a-pass2')||{}).value||'';
      if(!name.trim()){err('Please enter your name.');return}
      if(pass!==pass2){err('Passwords do not match.');return}
      if(accs[email]){err('Email already registered.');return}
      accs[email]={name:name.trim(),pass};
      localStorage.setItem('wx_accounts',JSON.stringify(accs));
      S.setUser({name:name.trim(),email});
    }else{
      if(!accs[email]){err('No account found. Create one first.');return}
      if(accs[email].pass!==pass){err('Incorrect password.');return}
      S.setUser({name:accs[email].name,email});
    }
    App.closeAll();toast(`Welcome, ${S.user.name}! 🚀`);
  },
  out(){S.setUser(null);toast('Signed out.')}
};

// =====================================================
// POLLS
// =====================================================
const Polls = {
  render() {
    const el=document.getElementById('m-polls');const can=!!S.user;
    el.innerHTML=`<div class="mh"><div class="mt">Polls</div><div class="mha">${can?`<button class="btn-s" onclick="Polls.toggleCreate()">${S.pollCreateOpen?'✕ Cancel':'+ New Poll'}</button>`:''}<button class="mbtn-x" onclick="App.closeAll()">✕</button></div></div>
    <div class="mb">${!can?`<div class="info-banner"><a onclick="App.open('auth')">Sign in</a> to create polls and vote</div>`:''}
    <div id="poll-form-c">${S.pollCreateOpen&&can?Polls.formHTML():''}</div>
    <div id="poll-list">${Polls.listHTML()}</div></div>`;
  },
  formHTML(){return`<div class="post-box"><div class="post-box-title">🗳️ New Poll</div>
  <div class="fg"><label class="fl">Question</label><input class="fi" id="poll-q" placeholder="e.g. Where should we travel this summer?"></div>
  <div class="fg"><label class="fl">Options (min 2, max 4)</label>
    <input class="fi" id="po-0" placeholder="Option 1" style="margin-bottom:8px">
    <input class="fi" id="po-1" placeholder="Option 2" style="margin-bottom:8px">
    <input class="fi" id="po-2" placeholder="Option 3 (optional)" style="margin-bottom:8px">
    <input class="fi" id="po-3" placeholder="Option 4 (optional)">
  </div>
  <button class="btn-p" onclick="Polls.create()">Launch Poll 🗳️</button></div>`},
  listHTML(){
    if(!S.polls||!S.polls.length)return`<div class="empty-st"><div class="empty-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div><p>No polls yet.<br>Create one to let friends vote!</p></div>`;
    return S.polls.slice().reverse().map(poll=>{
      const total=poll.options.reduce((s,o)=>s+(o.voters?o.voters.length:0),0);
      const myVote=S.user?poll.options.findIndex(o=>o.voters&&o.voters.includes(S.user.name)):-1;
      // BẤT KỲ AI ĐĂNG NHẬP ĐỀU ĐƯỢC XÓA
      const canDel=!!S.user;
      return`<div style="background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:20px;margin-bottom:14px">
        <div style="display:flex;align-items:start;justify-content:space-between;margin-bottom:14px">
          <div><div style="font-family:'DM Serif Display',serif;font-size:1.08rem;color:var(--txt);margin-bottom:4px">${poll.question}</div>
          <div style="font-size:.73rem;color:var(--td)">by ${poll.createdBy} · ${total} vote${total!==1?'s':''}</div></div>
          ${canDel?`<button onclick="Polls.delete(${poll.id})" style="padding:4px 10px;background:transparent;border:1px solid rgba(239,68,68,.3);border-radius:20px;color:rgba(239,68,68,.6);font-size:.7rem;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s" onmouseover="this.style.background='rgba(239,68,68,.1)'" onmouseout="this.style.background='transparent'">Delete</button>`:''}
        </div>
        ${poll.options.filter(o=>o.text&&o.text.trim()).map((opt,i)=>{
          const votes=opt.voters?opt.voters.length:0;
          const pct=total>0?Math.round(votes/total*100):0;
          const isMe=myVote===i;
          return`<div class="poll-option ${isMe?'voted':''}" onclick="${S.user?`Polls.vote(${poll.id},${i})`:`App.open('auth')`}">
            <div class="poll-bar" style="width:${pct}%"></div>
            <div class="poll-row">
              <span style="font-size:.88rem;color:${isMe?'var(--pl)':'var(--txt)'};font-weight:${isMe?600:400}">${opt.text}${isMe?' ✓':''}</span>
              <span style="font-size:.78rem;color:var(--tm);font-weight:600">${pct}% · ${votes}</span>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }).join('');
  },
  toggleCreate(){S.pollCreateOpen=!S.pollCreateOpen;document.getElementById('poll-form-c').innerHTML=S.pollCreateOpen?Polls.formHTML():'';const btn=document.querySelector('#m-polls .btn-s');if(btn)btn.textContent=S.pollCreateOpen?'✕ Cancel':'+ New Poll'},
  create(){
    const q=(document.getElementById('poll-q')||{}).value||'';if(!q.trim()){toast('Add a question first.');return}
    const opts=[0,1,2,3].map(i=>(document.getElementById('po-'+i)||{}).value||'').filter(t=>t.trim());
    if(opts.length<2){toast('Need at least 2 options.');return}
    const poll={id:Date.now(),question:q.trim(),options:opts.map(t=>({text:t.trim(),voters:[]})),createdBy:S.user.name,createdAt:new Date().toISOString()};
    if(!S.polls)S.polls=[];S.polls.push(poll);S.save('polls',S.polls);S.pollCreateOpen=false;Polls.render();toast('Poll launched! 🗳️');
  },
  vote(pollId,optIdx){
    if(!S.user){App.open('auth');return}
    const poll=S.polls.find(p=>p.id===pollId);if(!poll)return;
    const cur=poll.options.findIndex(o=>o.voters&&o.voters.includes(S.user.name));
    if(cur!==-1)poll.options[cur].voters=poll.options[cur].voters.filter(v=>v!==S.user.name);
    if(cur!==optIdx){if(!poll.options[optIdx].voters)poll.options[optIdx].voters=[];poll.options[optIdx].voters.push(S.user.name)}
    S.save('polls',S.polls);document.getElementById('poll-list').innerHTML=Polls.listHTML();
  },
  delete(id){if(!confirm('Delete this poll?'))return;S.polls=S.polls.filter(p=>p.id!==id);S.save('polls',S.polls);Polls.render();toast('Poll deleted.')}
};

// =====================================================
// STORIES
// =====================================================
const Stories = {
  render(){
    const el=document.getElementById('m-stories');const can=!!S.user;
    el.innerHTML=`<div class="mh"><div class="mt">Tales</div><div class="mha">${can?`<button class="btn-s" onclick="Stories.togglePost()">${S.postOpen?'✕ Cancel':'+ New Tale'}</button>`:''}<button class="mbtn-x" onclick="App.closeAll()">✕</button></div></div>

    <div id="sf-cont">${S.postOpen&&can?Stories.pFormHTML():''}</div><div id="sl">${Stories.listHTML()}</div></div>`;
  },
  pFormHTML(){return`<div class="post-box"><div class="post-box-title">✍️ New Entry</div>
  <div class="fg"><label class="fl">Title</label><input class="fi" id="sf-t" placeholder="Give your story a name..."></div>
  <div class="fg"><label class="fl">Story</label><textarea class="fta" id="sf-c" style="min-height:140px" placeholder="Begin your tale here..."></textarea></div>
  <div class="fg"><label class="fl">Tags</label><input class="fi" id="sf-g" placeholder="music, nights, memories..."></div>
  <button class="btn-p" onclick="Stories.post()">Publish Story</button></div>`},
  listHTML(){
    let arr = [];
    if (Array.isArray(S.stories)) { arr = S.stories; }
    else if (typeof S.stories === 'object' && S.stories !== null) { arr = Object.values(S.stories); }

    if(!arr.length) return`<div class="empty-st"><p>No stories yet.</p></div>`;

    return arr.slice().reverse().map(s=>{
      const author = s.author || 'Unknown';
      const ini = author.substring(0,2).toUpperCase();
      const likedBy = s.likedBy || []; 
      const likes = s.likes || 0;
      const liked = S.user && likedBy.includes(S.user.name);
      const tags = s.tags || [];
      const content = s.content || '';
      // BẤT KỲ AI ĐĂNG NHẬP ĐỀU ĐƯỢC XÓA
      const canDel = !!S.user;

      return`<div class="story-card" onclick="Stories.detail(${s.id})">
        <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:10px">
          <div class="sc-title" style="margin-bottom:0">${s.title}</div>
          ${canDel?`<button onclick="event.stopPropagation(); Stories.delete(${s.id})" style="padding:4px 10px;background:transparent;border:1px solid rgba(239,68,68,.3);border-radius:20px;color:rgba(239,68,68,.6);font-size:.7rem;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s" onmouseover="this.style.background='rgba(239,68,68,.1)'" onmouseout="this.style.background='transparent'">Delete</button>`:''}
        </div>
        <div class="sc-excerpt">${content.replace(/\n/g,' ').substring(0,120)}...</div>
        <div class="sc-meta"><div class="sc-author"><div class="sc-avi">${ini}</div>${author} · ${s.date}</div><button class="lbtn ${liked?'liked':''}" onclick="event.stopPropagation();Stories.like(${s.id})">♥ ${likes}</button></div>${tags.length?`<div class="tags-row" style="margin-top:10px">${tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>`:''}</div>`;
    }).join('')
  },
  togglePost(){S.postOpen=!S.postOpen;Stories.render()},
  post(){
    const t=(document.getElementById('sf-t')||{}).value||'';
    const c=(document.getElementById('sf-c')||{}).value||'';
    if(!t.trim()||!c.trim()){toast('Fill title and story!');return}
    const tags=((document.getElementById('sf-g')||{}).value||'').split(',').map(x=>x.trim()).filter(Boolean);
    
    if(!Array.isArray(S.stories)) S.stories = Object.values(S.stories || {});

    S.stories.push({id:Date.now(),title:t.trim(),content:c.trim(),author:S.user.name,date:new Date().toISOString().split('T')[0],likes:0,likedBy:[],tags});
    S.save('stories',S.stories);
    S.postOpen=false;
    Stories.render();
    toast('Published! ✨')
  },
  like(id){
    if(!S.user){toast('Sign in to like');return}
    if(!Array.isArray(S.stories)) S.stories = Object.values(S.stories || {});
    const s=S.stories.find(x=>x.id===id);
    if(!s)return;
    if(!s.likedBy) s.likedBy = [];
    const i=s.likedBy.indexOf(S.user.name);
    if(i>-1){s.likedBy.splice(i,1);s.likes=Math.max(0,(s.likes||0)-1)}
    else{s.likedBy.push(S.user.name);s.likes=(s.likes||0)+1}
    S.save('stories',S.stories);
    document.getElementById('sl').innerHTML=Stories.listHTML()
  },
  detail(id){
    if(!Array.isArray(S.stories)) return;
    const s=S.stories.find(x=>x.id===id);
    if(s)App.openOver('story',s)
  },
  renderDetail(s){
    const content = s.content || '';
    document.getElementById('m-story').innerHTML=`<div class="mh"><div class="mt" style="font-size:1.15rem;flex:1">${s.title}</div><div class="mha"><button class="mbtn-x" onclick="App.back()">←</button><button class="mbtn-x" onclick="App.closeAll()">✕</button></div></div><div class="mb"><div class="sfull">${content.replace(/\n/g,'<br>')}</div><div class="sfull-meta"><div>By ${s.author}</div><div>${s.date}</div></div></div>`
  },
  delete(id) {
    if(!confirm('Are you sure you want to delete this tale?')) return;
    if(!Array.isArray(S.stories)) S.stories = Object.values(S.stories || {});
    S.stories = S.stories.filter(s => s.id !== id);
    S.save('stories', S.stories);
    Stories.render();
    toast('Tale deleted. 🗑️');
  }
};

// GALLERY (ĐÃ THÊM TÍNH NĂNG XÓA API IMGBB)

// BẠN HÃY DÁN API KEY CỦA IMGBB VÀO DÒNG DƯỚI ĐÂY NHÉ:
const IMGBB_API_KEY = "DÁN_API_KEY_CỦA_BẠN_VÀO_ĐÂY";

const Gallery = {
  render(){const el=document.getElementById('m-gallery');const can=!!S.user;el.innerHTML=`<div class="mh"><div class="mt">Gallery</div><div class="mha">${can?`<button class="btn-s" onclick="Gallery.upload()">+ Add Photo</button>`:''}<button class="mbtn-x" onclick="App.closeAll()">✕</button></div></div>
  <div class="mb">${!can?`<div class="info-banner"><a onclick="App.open('auth')">Sign in</a> to add photos</div>`:''}
  <input type="file" id="gfup" accept="image/*" style="display:none" onchange="Gallery.handleUpload(event)">
  ${S.photos.length?`<div class="pg">${S.photos.map(p=>`<div class="pc" onclick="Gallery.lbx(${p.id})"><img src="${p.url}" loading="lazy"><div class="pc-ov"><div class="pc-cap">${p.cap}<br><span style="opacity:.6;font-size:.65rem">${p.by}</span></div></div></div>`).join('')}</div>`:`<div class="empty-st"><div class="empty-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div><p>No photos yet.</p></div>`}
  </div>`;},
  upload(){document.getElementById('gfup').click()},
  
  handleUpload(e){
    const f=e.target.files[0];if(!f)return;
    if(IMGBB_API_KEY === "DÁN_API_KEY_CỦA_BẠN_VÀO_ĐÂY") {
      alert("Hãy dán API Key của ImgBB vào code trước nhé!");
      return;
    }
    const cap=prompt('Caption:','')||'A new memory';
    toast('Đang tải ảnh lên ImgBB... ⏳');
    
    const formData = new FormData();
    formData.append('image', f);

    fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData })
    .then(response => response.json())
    .then(result => {
      if(result.success) {
        const url = result.data.url;
        if(!Array.isArray(S.photos)) S.photos = Object.values(S.photos || {});
        S.photos.push({ id: Date.now(), url: url, cap: cap.trim(), by: S.user.name, date: new Date().toISOString().split('T')[0] });
        S.save('photos', S.photos);
        Gallery.render();
        toast('Photo added! 📸');
      } else { toast('Lỗi khi tải ảnh lên ImgBB! ❌'); }
    })
    .catch(err => { console.error(err); toast('Lỗi kết nối mạng! ❌'); });

    e.target.value='';
  },
  lbx(id){App.openOver('lbx',S.photos.find(x=>x.id===id))},
  renderLbx(p){
    // BẤT KỲ AI ĐĂNG NHẬP ĐỀU ĐƯỢC XÓA ẢNH
    document.getElementById('m-lbx').innerHTML=`<div class="lbx-inner">
      <button class="lbx-x" onclick="App.back()">✕</button>
      ${!!S.user ? `<button class="lbx-del" onclick="Gallery.delete(${p.id})">🗑️</button>` : ''}
      <img class="lbx-img" src="${p.url}"><div class="lbx-cap">${p.cap} — ${p.by}</div>
    </div>`
  },
  delete(id){
    if(!confirm('Xóa bức ảnh này nhé?')) return;
    if(!Array.isArray(S.photos)) S.photos = Object.values(S.photos || {});
    S.photos = S.photos.filter(x => x.id !== id);
    S.save('photos', S.photos);
    App.back();
    Gallery.render();
    toast('Photo deleted. 🗑️');
  }
};

// =====================================================
// CALENDAR
// =====================================================
const Cal = {
  btypes:{meetup:'👥',travel:'✈️',event:'🎉',activity:'🎯',other:'📌'},
  bcolors:{meetup:'rgba(139,92,246,.25)',travel:'rgba(16,185,129,.25)',event:'rgba(245,158,11,.25)',activity:'rgba(236,72,153,.25)',other:'rgba(255,255,255,.1)'},

  render(){document.getElementById('m-calendar').innerHTML=`<div class="mh"><div class="mt">Calendar</div><button class="mbtn-x" onclick="App.closeAll()">✕</button></div><div class="mb">${Cal.bodyHTML()}</div>`},

  bodyHTML(){
    const y=S.calYear,m=S.calMonth;
    const mn=['January','February','March','April','May','June','July','August','September','October','November','December'];
    const days=this.getDays(y,m);const today=new Date().toISOString().split('T')[0];
    let grid=`<div class="cal-grid">`;
    ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>grid+=`<div class="cdh">${d}</div>`);
    days.forEach(d=>{
      if(d===null){grid+=`<div class="cd empty"></div>`;return}
      const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const myAv=S.user&&S.avail[S.user.name]&&S.avail[S.user.name][ds];
      const isPast=ds<today;const isSel=ds===S.selDay;
      const avOthers=Object.entries(S.avail).filter(([n,v])=>(!S.user||n!==S.user.name)&&v[ds]).map(([n])=>n);
      const dayBooks=(S.bookings||[]).filter(b=>b.date===ds);
      let cls='cd';if(isPast)cls+=' past';if(ds===today)cls+=' today';if(myAv&&!isPast)cls+=' my-av';if(isSel)cls+=' selected';
      const dots=avOthers.slice(0,2).map(n=>`<div class="cdd" style="background:${MEMBER_COLORS[n]||'#818CF8'}"></div>`).join('');
      const bookDot=dayBooks.length?`<div class="cdd" style="background:rgba(255,255,255,.7)"></div>`:'';
      grid+=`<div class="${cls}" onclick="Cal.selectDay('${ds}')"><div class="cd-num">${d}</div><div class="cd-dots">${dots}${myAv&&!isPast?`<div class="cdd" style="background:var(--amber)"></div>`:''}${bookDot}</div></div>`;
    });
    grid+=`</div>`;
    const detail=S.selDay?this.dayDetail(S.selDay):`<div class="cal-info"><span style="color:var(--td)">Select a date to view details or book an event</span></div>`;
    const upcoming=this.upcomingHTML();
    return`
    ${!S.user?`<div class="info-banner"><a onclick="App.open('auth')">Sign in</a> to mark availability & book events</div>`:
    `<div style="font-size:.78rem;color:var(--td);margin-bottom:14px;padding:10px 14px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid rgba(255,255,255,.05)">Click a date to mark availability or book an event</div>`}
    <div class="cal-hd"><button class="cal-nav" onclick="Cal.nav(-1)">‹</button><div class="cal-month">${mn[m]} ${y}</div><button class="cal-nav" onclick="Cal.nav(1)">›</button></div>
    <div class="cal-legend"><div class="cl-item"><div class="cl-dot" style="background:var(--amber)"></div>You're free</div><div class="cl-item"><div class="cl-dot" style="background:rgba(255,255,255,.7)"></div>Booked</div></div>
    ${grid}${detail}<div id="book-form-c"></div>${upcoming}`;
  },

  dayDetail(ds){
    const d=new Date(ds+'T00:00:00');const label=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    const today=new Date().toISOString().split('T')[0];const isPast=ds<today;
    const myAv=S.user&&S.avail[S.user.name]&&S.avail[S.user.name][ds];
    const allFree=Object.entries(S.avail).filter(([n,v])=>v[ds]).map(([n])=>n);
    const books=(S.bookings||[]).filter(b=>b.date===ds);
    const avHTML=allFree.length?`<div style="margin-bottom:10px"><span style="font-size:.78rem;color:var(--tm)">Free: </span>${allFree.map(n=>`<span style="color:${n===S.user?.name?'var(--amber)':'var(--pl)'};font-weight:600;margin-right:6px;font-size:.82rem">${n}</span>`).join('')}</div>`:`<div style="color:var(--td);font-size:.8rem;margin-bottom:10px">Nobody marked as free yet.</div>`;
    // BẤT KỲ AI ĐĂNG NHẬP ĐỀU ĐƯỢC XÓA BOOKING
    const booksHTML=books.length?books.map(b=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.06);border-radius:10px;margin-bottom:7px"><div style="width:34px;height:34px;border-radius:9px;background:${this.bcolors[b.type]||this.bcolors.other};display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0">${this.btypes[b.type]||'📌'}</div><div style="flex:1"><div style="font-weight:600;color:var(--txt);font-size:.86rem">${b.title}</div><div style="color:var(--tm);font-size:.72rem">${b.time?b.time+' · ':''}by ${b.createdBy}</div></div>${!!S.user ? `<button onclick="Cal.deleteBooking(${b.id})" style="padding:2px 8px;background:transparent;border:1px solid rgba(239,68,68,.3);border-radius:20px;color:rgba(239,68,68,.6);font-size:.7rem;cursor:pointer;font-family:'Outfit',sans-serif" onmouseover="this.style.background='rgba(239,68,68,.1)'" onmouseout="this.style.background='transparent'">✕</button>`:''}</div>`).join(''):`<div style="color:var(--td);font-size:.8rem">No events booked for this day.</div>`;
    const actions=!isPast&&S.user?`<div style="display:flex;gap:8px;margin-top:12px"><button class="btn-s" style="flex:1" onclick="Cal.toggleAv('${ds}')">${myAv?'✓ I\'m Free (click to remove)':'📍 Mark Me as Free'}</button><button style="flex:1;padding:9px 20px;background:var(--pd);border:1px solid var(--bdrh);border-radius:11px;color:var(--pl);font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:var(--tr)" onmouseover="this.style.background='var(--pb)'" onmouseout="this.style.background='var(--pd)'" onclick="Cal.openBookForm('${ds}')">📌 Book Event</button></div>`:!S.user?`<button class="btn-p" style="margin-top:10px" onclick="App.open('auth')">Sign in to book or mark availability</button>`:'';
    return`<div class="cal-info" style="margin-bottom:10px"><div class="cal-info-date">${label}</div>${avHTML}${booksHTML}${actions}</div>`;
  },

  openBookForm(ds){
    document.getElementById('book-form-c').innerHTML=`<div class="post-box" style="margin-top:0">
    <div class="post-box-title">📌 Book Event — ${ds}</div>
    <div class="fg"><label class="fl">Event Title</label><input class="fi" id="bk-title" placeholder="e.g. Group Dinner, Study Session..."></div>
    <div class="fg"><label class="fl">Time (optional)</label><input class="fi" id="bk-time" type="time"></div>
    <div class="fg"><label class="fl">Type</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${Object.entries(this.btypes).map(([k,e])=>`<button data-btype="${k}" onclick="Cal.selectBType('${k}')" style="padding:6px 14px;border:1px solid rgba(255,255,255,.1);border-radius:20px;background:rgba(255,255,255,.03);color:var(--tm);font-family:'Outfit',sans-serif;font-size:.8rem;cursor:pointer;transition:all .2s">${e} ${k.charAt(0).toUpperCase()+k.slice(1)}</button>`).join('')}
      </div>
    </div>
    <div class="fg"><label class="fl">Notes</label><textarea class="fta" id="bk-notes" style="min-height:60px" placeholder="Any details?"></textarea></div>
    <div style="display:flex;gap:8px"><button class="btn-p" style="flex:2" onclick="Cal.saveBooking('${ds}')">Save Booking</button><button class="btn-s" style="flex:1" onclick="document.getElementById('book-form-c').innerHTML=''">Cancel</button></div>
    </div>`;
    S.bookType='meetup';Cal.selectBType('meetup');
  },

  selectBType(type){
    S.bookType=type;
    document.querySelectorAll('[data-btype]').forEach(b=>{
      b.style.background=b.dataset.btype===type?this.bcolors[type]:'rgba(255,255,255,.03)';
      b.style.borderColor=b.dataset.btype===type?'var(--pl)':'rgba(255,255,255,.1)';
      b.style.color=b.dataset.btype===type?'var(--txt)':'var(--tm)';
    });
  },

  saveBooking(ds){
    const title=(document.getElementById('bk-title')||{}).value||'';if(!title.trim()){toast('Please add a title.');return}
    const time=(document.getElementById('bk-time')||{}).value||'';const notes=(document.getElementById('bk-notes')||{}).value||'';
    const booking={id:Date.now(),title:title.trim(),date:ds,time,type:S.bookType||'meetup',notes:notes.trim(),createdBy:S.user.name,createdAt:new Date().toISOString()};
    if(!S.bookings)S.bookings=[];S.bookings.push(booking);S.save('bookings',S.bookings);
    toast('Event booked! 📌');document.getElementById('book-form-c').innerHTML='';Cal.selectDay(ds);
  },

  deleteBooking(id){if(!confirm('Remove this booking?'))return;S.bookings=S.bookings.filter(b=>b.id!==id);S.save('bookings',S.bookings);Cal.selectDay(S.selDay);},

  toggleAv(ds){
    if(!S.user){toast('Sign in first.');return}
    if(!S.avail[S.user.name])S.avail[S.user.name]={};
    S.avail[S.user.name][ds]=!S.avail[S.user.name][ds];
    if(!S.avail[S.user.name][ds])delete S.avail[S.user.name][ds];
    S.save('avail',S.avail);Cal.selectDay(ds);
  },

  selectDay(ds){S.selDay=ds;const mb=document.querySelector('#m-calendar .mb');if(mb)mb.innerHTML=Cal.bodyHTML()},

  upcomingHTML(){
    const today=new Date().toISOString().split('T')[0];
    const up=(S.bookings||[]).filter(b=>b.date>=today).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,4);
    if(!up.length)return'';
    return`<div style="margin-top:18px"><div style="font-size:.72rem;font-weight:700;color:var(--td);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px">Upcoming Events</div>
    ${up.map(b=>`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)">
      <div style="width:44px;text-align:center;flex-shrink:0"><div style="font-size:.68rem;color:var(--tm)">${new Date(b.date+'T00:00').toLocaleDateString('en',{month:'short'})}</div><div style="font-size:1.2rem;font-weight:700;color:var(--txt);line-height:1">${new Date(b.date+'T00:00').getDate()}</div></div>
      <div style="width:36px;height:36px;border-radius:9px;background:${this.bcolors[b.type]||this.bcolors.other};display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0">${this.btypes[b.type]||'📌'}</div>
      <div style="flex:1;min-width:0"><div style="font-weight:600;color:var(--txt);font-size:.86rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.title}</div><div style="color:var(--tm);font-size:.72rem">${b.time||'All day'} · ${b.createdBy}</div></div>
    </div>`).join('')}</div>`;
  },

  getDays(y,m){const first=new Date(y,m,1).getDay(),count=new Date(y,m+1,0).getDate(),arr=[];for(let i=0;i<first;i++)arr.push(null);for(let d=1;d<=count;d++)arr.push(d);return arr},
  nav(dir){S.calMonth+=dir;if(S.calMonth>11){S.calMonth=0;S.calYear++}if(S.calMonth<0){S.calMonth=11;S.calYear--}S.selDay=null;const mb=document.querySelector('#m-calendar .mb');if(mb)mb.innerHTML=Cal.bodyHTML()}
};

// =====================================================
// PROFILE
// =====================================================
const Profile = {
  render(){
    const el=document.getElementById('m-profile');
    el.innerHTML=`<div class="mh"><div class="mt">Profile</div><button class="mbtn-x" onclick="App.closeAll()">✕</button></div>
    <div class="mb">${!S.user?`<div class="empty-st"><p style="margin-bottom:16px">Please sign in to view your profile.</p><button class="btn-p" onclick="App.open('auth')">Sign In</button></div>`:
    `<div style="text-align:center;padding:20px 0 30px">
       <div class="avi" style="width:80px;height:80px;font-size:2rem;margin:0 auto 16px">${S.user.name.slice(0,2).toUpperCase()}</div>
       <div style="font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--txt);margin-bottom:6px">${S.user.name}</div>
       <div style="color:var(--tm);font-size:.85rem;margin-bottom:30px">${S.user.email}</div>
       <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px">
         <div style="background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:14px;text-align:center"><div style="font-size:1.5rem;font-weight:700;color:var(--pl)">${S.stories.filter(s=>s.author===S.user.name).length}</div><div style="font-size:.72rem;color:var(--tm)">Tales</div></div>
         <div style="background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:14px;text-align:center"><div style="font-size:1.5rem;font-weight:700;color:var(--amber)">${S.plans.filter(p=>p.addedBy===S.user.name).length}</div><div style="font-size:.72rem;color:var(--tm)">Visions</div></div>
         <div style="background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:14px;text-align:center"><div style="font-size:1.5rem;font-weight:700;color:var(--rose)">${S.polls.filter(p=>p.createdBy===S.user.name).length}</div><div style="font-size:.72rem;color:var(--tm)">Polls</div></div>
       </div>
       <button class="btn-s" style="width:100%" onclick="Auth.out();App.closeAll()">Sign Out</button>
     </div>`}
    </div>`;
  }
};

// =====================================================
// TOAST
// =====================================================
let toastT;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('on'),2800)}

// =====================================================
// FIREBASE REAL-TIME SYNC
// =====================================================
function initFirebaseSync(){
  if(!fbDB) return;
  ['stories','photos','plans','polls','bookings','avail'].forEach(key=>{
    DB.subscribe(key,val=>{
      if(val===null)return;
      const cur=S.stack[S.stack.length-1];
      S[key]=val;
      if(cur&&document.activeElement&&!document.activeElement.classList.contains('fi')&&!document.activeElement.classList.contains('fta')){
        const el=document.getElementById('m-'+cur);
        if(el&&el.classList.contains('on'))App.render(cur);
      }
    });
  });
}

// =====================================================
// BOOT
// =====================================================
S.load();
App.updateAuth(); 
initFirebaseSync();
</script>
</body>
</html>
